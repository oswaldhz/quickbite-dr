services:
  postgres:
    image: postgres:16
    container_name: quickbite_postgres
    restart: always
    environment:
      POSTGRES_DB: quickbite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - quickbite_data:/var/lib/postgresql/data

volumes:
  quickbite_data: